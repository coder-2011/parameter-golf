# 11 effective transformer applications by widening the non-recurrent shell:
#   prelude 3 + recurrent core 2 * recurrence 2 + coda 4 = 11
# Keeps the successful BigramHash/KV2/QK-norm recurrence baseline otherwise matched.
run_id: parcae_min_5min_eff11_prelude3_coda4_recur2_seq512_mlp3_bigram4096x128h2_gate_no_value_kv2_qknorm_rope16_20260425
script: train_gpt_parcae.py
env:
  DATA_PATH: ./data/datasets/fineweb10B_sp1024
  TOKENIZER_PATH: ./data/tokenizers/fineweb_1024_bpe.model
  VOCAB_SIZE: 1024
  MODEL_DIM: 256
  NUM_HEADS: 4
  NUM_KV_HEADS: 2
  MLP_MULT: 3
  N_LAYERS_IN_PRELUDE: 3
  N_LAYERS_IN_RECURRENT_BLOCK: 2
  N_LAYERS_IN_CODA: 4
  RECURRENT_DIM: 256
  RECURRENT_NUM_HEADS: 4
  MEAN_RECURRENCE: 2
  MEAN_BACKPROP_DEPTH: 2
  TRAIN_BATCH_TOKENS: 16384
  TRAIN_SEQ_LEN: 512
  ITERATIONS: 1000000
  MAX_WALLCLOCK_SECONDS: 300
  WARMUP_STEPS: 500
  TRAIN_LOG_EVERY: 100
  VAL_LOSS_EVERY: 0
  COMPILE_MODEL: 0
  COMPILE_MUON_BACKEND: 0
  ROPE_DIMS: 16
  QK_NORM: 1
  USE_VALUE_EMBEDDINGS: 0
  BIGRAM_HASH_BUCKETS: 4096
  BIGRAM_HASH_DIM: 128
  BIGRAM_HASH_HEADS: 2
  BIGRAM_HASH_GATE: 1
